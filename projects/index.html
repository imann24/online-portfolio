<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — Isaiah Mann</title>
    <meta name="description" content="A decade of games, tools, and interactive experiences from Isaiah Mann.">

    <link rel="shortcut icon" type="image/x-icon" href="../images/favicon/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/modern.css">
    <style>
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
            margin-top: 40px;
        }
        .project-card {
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--bg-elevated);
            border: 1px solid var(--hairline);
            border-radius: var(--radius-md);
            overflow: hidden;
            color: var(--ink);
            padding: 20px 20px 18px;
            min-height: 168px;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .project-card:hover {
            transform: translateY(-2px);
            border-color: var(--hairline-strong);
            box-shadow: var(--shadow-md);
            color: var(--ink);
        }
        .project-card-thumb {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: var(--bg-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid var(--hairline);
            flex-shrink: 0;
            margin-bottom: 14px;
        }
        .project-card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .project-card-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .project-card-title {
            font-family: var(--font-body);
            font-size: 0.98rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.005em;
        }
        .project-card-desc {
            font-size: 13px;
            color: var(--ink-mute);
            line-height: 1.45;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .project-card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--hairline);
            font-family: var(--font-mono);
            font-size: 10.5px;
            letter-spacing: 0.06em;
            color: var(--ink-mute);
            text-transform: uppercase;
        }
        .project-card-meta:empty { display: none; }
        .project-card.is-featured {
            background: linear-gradient(180deg, #fff 0%, #faf3e8 100%);
            border-color: rgba(217, 106, 61, 0.4);
        }
        .project-card .featured-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font-mono);
            font-size: 9.5px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: var(--radius-pill);
            font-weight: 600;
        }
        .project-card.is-featured .project-card-thumb {
            background: #fff;
        }
        .project-card.is-featured .project-card-thumb img {
            object-fit: contain;
            padding: 4px;
        }
        .projects-loading {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--ink-mute);
            font-size: 14px;
            font-family: var(--font-mono);
            margin-top: 40px;
        }
        .projects-loading .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--hairline-strong);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="/js/theme.js"></script>
</head>
<body>

<header class="nav">
    <div class="container nav-inner">
        <a href="/" class="nav-brand">
            <img class="nav-brand-avatar" src="../images/photos/isaiah.png" alt="Isaiah Mann">
            <span>Isaiah Mann</span>
        </a>
        <nav class="nav-links">
            <a href="/#work" class="nav-link-hide-sm">Work</a>
            <a href="/#about" class="nav-link-hide-sm">About</a>
            <a href="../projects/" class="is-active">Projects</a>
            <a href="../resume/">Resume</a>
            <a href="https://heynaru.com/" target="_blank" rel="noopener" class="nav-cta">
                Naru <span aria-hidden="true">↗</span>
            </a>
        </nav>
    </div>
</header>

<section class="section" style="padding-top: clamp(48px, 7vw, 96px);">
    <div class="container">
        <p class="eyebrow">Projects</p>
        <h1 style="font-size: clamp(2.4rem, 5vw, 3.6rem); margin-bottom: 20px;">A decade of building things people use.</h1>
        <p class="lede">
            Games, tools, AI products, and interactive experiences — from
            student-studio releases to production apps shipping to thousands.
        </p>

        <div id="projects-loading" class="projects-loading">
            <span class="spinner"></span>
            <span>Loading projects…</span>
        </div>
        <div id="projects-grid" class="projects-grid" hidden></div>
    </div>
</section>

<footer class="footer">
    <div class="container footer-inner">
        <div>© <span id="year">2026</span> Isaiah Mann · Seattle</div>
        <div><a href="/" style="color: var(--ink-mute);">← Back home</a></div>
    </div>
</footer>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const featuredNaru = {
        Key: '__naru',
        Title: 'Naru',
        Description: 'A conversational AI companion anchored to who you\'re trying to become.',
        ExternalLink: 'https://heynaru.com/',
        IconOverride: '../images/projects/naru-icon.png',
        Featured: true,
        Meta: ['2026 — Now', 'AI']
    };

    function describePlatforms(p) {
        if (!p || !p.length || p[0] === 'N/A') return '';
        return p.slice(0, 2).join(' · ');
    }

    function describeYear(p) {
        if (!p.StartDate) return '';
        const start = new Date(p.StartDate).getFullYear();
        if (p.IsOngoing) return `${start} — Now`;
        if (p.EndDate) {
            const end = new Date(p.EndDate).getFullYear();
            return start === end ? `${start}` : `${start} — ${end}`;
        }
        return `${start}`;
    }

    function renderCard(p) {
        const isFeatured = p.Featured === true;
        const iconSrc = p.IconOverride || `${p.Key}/icon.png`;
        const href = p.ExternalLink || p.Key;
        const target = p.ExternalLink ? ' target="_blank" rel="noopener"' : '';
        const meta = p.Meta || [describeYear(p), describePlatforms(p.Platforms)].filter(Boolean);
        return `
            <a class="project-card ${isFeatured ? 'is-featured' : ''}" href="${href}"${target}>
                ${isFeatured ? '<span class="featured-badge">Current</span>' : ''}
                <div class="project-card-thumb">
                    <img src="${iconSrc}" alt="${p.Title} icon" loading="lazy" width="56" height="56">
                </div>
                <div class="project-card-body">
                    <h3 class="project-card-title">${p.Title}${p.ExternalLink ? ' ↗' : ''}</h3>
                    <p class="project-card-desc">${p.Description || ''}</p>
                    ${meta.length ? `<div class="project-card-meta">${meta.map(m => `<span>${m}</span>`).join('')}</div>` : ''}
                </div>
            </a>
        `;
    }

    fetch('../json/projects.json')
        .then(r => r.json())
        .then(data => {
            const projects = (data.Projects || [])
                .filter(p => p.ShouldDisplay !== false)
                .sort((a, b) => (a.SortPriority || 99) - (b.SortPriority || 99));
            const all = [featuredNaru, ...projects];
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = all.map(renderCard).join('');
            document.getElementById('projects-loading').hidden = true;
            grid.hidden = false;
        })
        .catch(err => {
            document.getElementById('projects-loading').textContent = 'Could not load projects.';
            console.error(err);
        });
</script>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-VWLRJPSKE3"></script>

    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VWLRJPSKE3');
</script>

</body>
</html>
